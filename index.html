<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐾 몽이 당뇨 케어</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&family=Fredoka:wght@600&display=swap');
:root{--primary:#9B59B6;--primary-light:#F4ECF7;--blood-color:#FF6BB3;--success:#4ECDC4;--warning:#FFD93D;--danger:#FF6B6B;--bg:#FFF8FB;--card-bg:#FFF;--text:#2C3E50;--text-light:#7F8C8D;--border:#F0E6EE;--shadow:rgba(155,89,182,.15)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;padding-bottom:80px}
.setup-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,var(--primary) 0%,#B68FCB 100%);display:flex;align-items:center;justify-content:center;z-index:10000;padding:20px}
.setup-card{background:#fff;border-radius:20px;padding:40px 30px;max-width:400px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.setup-title{font-size:24px;font-weight:700;color:var(--primary);margin-bottom:10px;text-align:center}
.setup-subtitle{font-size:14px;color:var(--text-light);margin-bottom:30px;text-align:center;line-height:1.6}
.setup-input{width:100%;padding:16px;border:2px solid var(--border);border-radius:12px;font-size:18px;text-align:center;font-weight:700;text-transform:uppercase;margin-bottom:20px;font-family:'Noto Sans KR',sans-serif}
.setup-input:focus{outline:0;border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-light)}
.setup-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--primary),#B68FCB);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:transform .2s;font-family:'Noto Sans KR',sans-serif}
.setup-btn:active{transform:scale(.98)}
.setup-info{margin-top:20px;padding:15px;background:var(--primary-light);border-radius:12px;font-size:13px;color:var(--text);line-height:1.6}
.setup-info strong{color:var(--primary)}
.setup-status{margin-top:15px;padding:10px;border-radius:8px;font-size:13px;text-align:center;display:none}
.setup-status.error{display:block;background:#FFE5E5;color:var(--danger)}
.setup-status.success{display:block;background:#E5F9F7;color:var(--success)}
.setup-status.loading{display:block;background:#FFF9E5;color:#E67E22}
.family-id-display{background:var(--primary-light);padding:8px 16px;border-radius:20px;display:inline-block;font-size:13px;font-weight:600;color:var(--primary)}
.app-header{background:linear-gradient(135deg,var(--primary) 0%,#B68FCB 100%);color:#fff;padding:15px 15px 25px;box-shadow:0 4px 20px var(--shadow);position:sticky;top:0;z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.app-title{font-family:Fredoka,sans-serif;font-size:20px;font-weight:600;display:flex;align-items:center;gap:6px}
.family-selector{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 10px;border-radius:15px;font-size:13px;font-weight:600}
.family-selector option{color:var(--text)}
.quick-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.stat-card{background:rgba(255,255,255,.25);backdrop-filter:blur(10px);border-radius:12px;padding:10px 6px;text-align:center}
.stat-value{font-size:18px;font-weight:700;margin-bottom:2px}
.stat-label{font-size:10px;opacity:.9}
.sync-indicator{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:rgba(255,255,255,.9)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4ECDC4;animation:pulse 2s infinite}
.sync-dot.offline{background:var(--danger);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.nav-tabs{display:flex;gap:6px;padding:12px 15px 0;background:var(--bg);position:sticky;top:120px;z-index:99;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav-tabs::-webkit-scrollbar{display:none}
.tab-btn{background:#fff;border:2px solid var(--border);color:var(--text-light);padding:8px 16px;border-radius:25px;font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;white-space:nowrap;flex-shrink:0;font-family:'Noto Sans KR',sans-serif}
.tab-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);transform:translateY(-2px);box-shadow:0 4px 12px var(--shadow)}
.content{padding:15px}
.tab-content{display:none}
.tab-content.active{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card-bg);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.card-title{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--text);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.chart-container{height:220px;position:relative;margin-top:10px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:14px;font-weight:600;margin-bottom:6px;color:var(--text)}
.form-input{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:12px;font-size:16px;transition:all .3s;background:#fff;font-family:'Noto Sans KR',sans-serif}
.form-input:focus{outline:0;border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-light)}
.number-input-group{display:flex;align-items:center;gap:8px}
.number-input-group .form-input{flex:1;text-align:center;font-size:22px;font-weight:700;color:var(--primary)}
.btn-number{width:48px;height:48px;border-radius:12px;border:none;background:var(--primary);color:#fff;font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-number:active{transform:scale(.95)}
.quick-value-buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.btn-quick{padding:10px;border:2px solid var(--border);background:#fff;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text);font-family:'Noto Sans KR',sans-serif}
.btn-quick:active{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Noto Sans KR',sans-serif}
.btn-primary{background:linear-gradient(135deg,var(--primary),#B68FCB);color:#fff;box-shadow:0 4px 15px var(--shadow)}
.btn-primary:active{transform:scale(.98)}
.record-item{background:var(--bg);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.record-info{flex:1}
.record-time{font-size:12px;color:var(--text-light);margin-bottom:4px}
.record-value{font-size:16px;font-weight:700;color:var(--text)}
.record-actions{display:flex;gap:6px}
.btn-icon{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-edit{background:var(--primary);color:#fff}
.btn-delete{background:var(--danger);color:#fff}
.chart-period-btn{padding:5px 14px;border:2px solid var(--border);background:#fff;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-light);font-family:'Noto Sans KR',sans-serif}
.chart-period-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.empty-state{text-align:center;padding:30px 20px;color:var(--text-light)}
.empty-icon{font-size:40px;margin-bottom:10px;opacity:.5}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:15px}
.modal.active{display:flex}
.modal-content{background:#fff;border-radius:20px;padding:20px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;animation:modalIn .3s}
@keyframes modalIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:18px;font-weight:700}
.btn-close{background:0 0;border:none;font-size:28px;cursor:pointer;color:var(--text-light);padding:0;width:32px;height:32px}
.toggle-group{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.toggle-btn{padding:10px;border:2px solid var(--border);background:#fff;border-radius:10px;cursor:pointer;font-weight:600;transition:all .3s;font-family:'Noto Sans KR',sans-serif}
.toggle-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.blood-level{display:inline-block;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600;margin-left:6px}
.level-low{background:#FFE5E5;color:var(--danger)}
.level-normal{background:#E5F9F7;color:var(--success)}
.level-high{background:#FFF9E5;color:#E67E22}
.family-badge{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:600;margin-left:6px}
</style>
</head>
<body>

<div class="setup-screen" id="setupScreen">
<div class="setup-card">
<div class="setup-title">🐾 몽이 당뇨 케어</div>
<div class="setup-subtitle">가족과 함께 몽이의 건강을 관리하세요</div>
<input type="text" class="setup-input" id="familyIdInput" placeholder="가족 ID 입력" maxlength="20">
<button class="setup-btn" id="setupBtn">시작하기</button>
<div class="setup-status" id="setupStatus"></div>
<div class="setup-info"><strong>💡 처음 사용하시나요?</strong><br>가족 대표가 원하는 ID를 입력하고 시작하세요.<br>(예: MONG-FAMILY)<br><br><strong>🔗 이미 사용 중이라면?</strong><br>가족에게 받은 ID를 입력하세요.</div>
</div>
</div>

<div id="mainApp" style="display:none">
<div class="app-header">
<div class="header-top">
<div class="app-title">🐾 몽이 당뇨 케어
<span class="sync-indicator"><span class="sync-dot" id="syncDot"></span><span id="syncText">연결 중...</span></span>
</div>
<select class="family-selector" id="familySelector"><option value="all">전체 보기</option><option value="엄마">엄마</option><option value="아빠">아빠</option><option value="딸">딸</option></select>
</div>
<div style="text-align:center;margin-bottom:8px"><div class="family-id-display" id="familyIdDisplay"></div></div>
<div class="quick-stats">
<div class="stat-card"><div class="stat-value" id="todayAvgBlood">-</div><div class="stat-label">오늘 평균 혈당</div></div>
<div class="stat-card"><div class="stat-value" id="todayInsulin">-</div><div class="stat-label">오늘 인슐린</div></div>
<div class="stat-card"><div class="stat-value" id="todayRecords">0</div><div class="stat-label">오늘 기록</div></div>
</div>
</div>
<div class="nav-tabs">
<button class="tab-btn active" data-tab="dashboard">📊 대시보드</button>
<button class="tab-btn" data-tab="blood">💉 혈당</button>
<button class="tab-btn" data-tab="insulin">💊 인슐린</button>
<button class="tab-btn" data-tab="food">🍖 사료</button>
<button class="tab-btn" data-tab="water">💧 물</button>
</div>
<div class="content">
<div class="tab-content active" id="dashboard">
<div class="card">
<div class="card-title">📈 혈당 추이<div style="margin-left:auto;display:flex;gap:6px"><button class="chart-period-btn active" data-period="7" id="period7">7일</button><button class="chart-period-btn" data-period="30" id="period30">한달</button></div></div>
<div class="chart-container"><canvas id="bloodChart"></canvas></div>
</div>
<div class="card"><div class="card-title">📋 오늘의 기록</div><div id="todayRecordsList"></div></div>
</div>
<div class="tab-content" id="blood"><div class="card"><button class="btn btn-primary" id="addBlood">➕ 혈당 기록 추가</button></div><div id="bloodRecordsList"></div></div>
<div class="tab-content" id="insulin"><div class="card"><button class="btn btn-primary" id="addInsulin">➕ 인슐린 기록 추가</button></div><div id="insulinRecordsList"></div></div>
<div class="tab-content" id="food"><div class="card"><button class="btn btn-primary" id="addFood">➕ 사료 기록 추가</button></div><div id="foodRecordsList"></div></div>
<div class="tab-content" id="water"><div class="card"><button class="btn btn-primary" id="addWater">➕ 물 섭취 기록 추가</button></div><div id="waterRecordsList"></div></div>
</div>
</div>

<div class="modal" id="recordModal"><div class="modal-content"><div class="modal-header"><h3 class="modal-title" id="modalTitle">기록 추가</h3><button class="btn-close" id="closeModalBtn">&times;</button></div>
<div>
<input type="hidden" id="recordType"><input type="hidden" id="editId">
<div class="form-group"><label class="form-label">날짜</label><input type="date" class="form-input" id="recordDate"></div>
<div class="form-group"><label class="form-label">시간</label><input type="time" class="form-input" id="recordTime"></div>
<div class="form-group" id="bloodValueGroup" style="display:none"><label class="form-label">혈당 수치 (mg/dL)</label><div class="number-input-group"><button type="button" class="btn-number" id="bloodMinus">-</button><input type="number" class="form-input" id="bloodValue" min="0" value="100"><button type="button" class="btn-number" id="bloodPlus">+</button></div><div class="quick-value-buttons" id="bloodQuick"></div></div>
<div class="form-group" id="insulinValueGroup" style="display:none"><label class="form-label">인슐린 용량 (단위)</label><div class="number-input-group"><button type="button" class="btn-number" id="insulinMinus">-</button><input type="number" class="form-input" id="insulinValue" min="0" value="13"><button type="button" class="btn-number" id="insulinPlus">+</button></div><div class="quick-value-buttons" id="insulinQuick"></div></div>
<div class="form-group" id="foodValueGroup" style="display:none"><label class="form-label">사료 급여량 (g)</label><div class="number-input-group"><button type="button" class="btn-number" id="foodMinus">-</button><input type="number" class="form-input" id="foodValue" min="0" value="150"><button type="button" class="btn-number" id="foodPlus">+</button></div><div class="quick-value-buttons" id="foodQuick"></div></div>
<div class="form-group" id="waterValueGroup" style="display:none"><label class="form-label">물 섭취량 (ml)</label><div class="number-input-group"><button type="button" class="btn-number" id="waterMinus">-</button><input type="number" class="form-input" id="waterValue" min="0" value="150"><button type="button" class="btn-number" id="waterPlus">+</button></div><div class="quick-value-buttons" id="waterQuick"></div></div>
<div class="form-group"><label class="form-label">기록자</label><div class="toggle-group" id="recorderGroup"><button type="button" class="toggle-btn" data-name="엄마">엄마</button><button type="button" class="toggle-btn" data-name="아빠">아빠</button><button type="button" class="toggle-btn" data-name="딸">딸</button></div><input type="hidden" id="recordRecorder"></div>
<div class="form-group"><label class="form-label">메모 (선택)</label><textarea class="form-input" id="recordMemo" rows="2" placeholder="특이사항을 기록해주세요"></textarea></div>
<button type="button" class="btn btn-primary" id="submitBtn">저장하기</button>
</div></div></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getDatabase,ref,set,onValue,remove}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const firebaseConfig={
apiKey:"AIzaSyBPU9ipOrqm44w76fiMyZNtHugkQg5YOmA",
authDomain:"mong-care.firebaseapp.com",
databaseURL:"https://mong-care-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"mong-care",
storageBucket:"mong-care.firebasestorage.app",
messagingSenderId:"340047292310",
appId:"1:340047292318:web:749723dc630787364ea7b7",
measurementId:"G-Q5ENFVLRMY"
};

let fbApp,database;
try{
fbApp=initializeApp(firebaseConfig);
database=getDatabase(fbApp);
console.log('✅ Firebase 초기화 성공');
}catch(e){
console.error('❌ Firebase 초기화 실패:',e);
}

let records=[],currentChart=null,currentChartPeriod=7,familyId=null;

/* ========== 셋업 ========== */
document.getElementById('setupBtn').addEventListener('click',function(){
var input=document.getElementById('familyIdInput').value.trim().toUpperCase();
if(!input){showSetupStatus('가족 ID를 입력해주세요','error');return;}
if(!database){showSetupStatus('Firebase 연결에 실패했습니다. 인터넷 연결을 확인하세요.','error');return;}
familyId=input;
localStorage.setItem('mongiFamilyId',familyId);
showSetupStatus('연결 중...','loading');
document.getElementById('familyIdDisplay').textContent='가족 ID: '+familyId;
migrateLocalStorageData();
setTimeout(function(){
document.getElementById('setupScreen').style.display='none';
document.getElementById('mainApp').style.display='block';
startApp();
},500);
});

function showSetupStatus(msg,type){
var el=document.getElementById('setupStatus');
el.textContent=msg;el.className='setup-status '+type;
}

/* ========== 마이그레이션 ========== */
function migrateLocalStorageData(){
var localData=localStorage.getItem('mongiDiabetesRecords');
if(!localData)return;
try{
var lr=JSON.parse(localData);
if(lr&&lr.length>0){
console.log('📦 로컬 데이터 마이그레이션:',lr.length+'개');
lr.forEach(function(record){
set(ref(database,'families/'+familyId+'/records/'+record.id),record);
});
console.log('✅ 마이그레이션 완료');
}
}catch(e){console.error('마이그레이션 실패:',e);}
}

/* ========== 앱 시작 ========== */
function startApp(){
initTabs();initButtons();setDefaultDateTime();loadRecordsFromFirebase();
}

function loadRecordsFromFirebase(){
var recordsRef=ref(database,'families/'+familyId+'/records');
onValue(recordsRef,function(snapshot){
var data=snapshot.val();
records=data?Object.values(data):[];
console.log('🔥 Firebase 로드:',records.length+'개');
document.getElementById('syncDot').classList.remove('offline');
document.getElementById('syncText').textContent='실시간 동기화';
renderAll();updateQuickStats();
},function(error){
console.error('Firebase 읽기 실패:',error);
document.getElementById('syncDot').classList.add('offline');
document.getElementById('syncText').textContent='연결 실패';
});
}

/* ========== 탭 ========== */
function initTabs(){
document.querySelectorAll('.tab-btn').forEach(function(tab){
tab.addEventListener('click',function(){
var target=tab.dataset.tab;
document.querySelectorAll('.tab-btn').forEach(function(t){t.classList.remove('active');});
tab.classList.add('active');
document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
document.getElementById(target).classList.add('active');
if(target==='dashboard')setTimeout(renderChart,100);
});
});
}

/* ========== 버튼 이벤트 ========== */
function initButtons(){
document.getElementById('addBlood').addEventListener('click',function(){openModal('blood');});
document.getElementById('addInsulin').addEventListener('click',function(){openModal('insulin');});
document.getElementById('addFood').addEventListener('click',function(){openModal('food');});
document.getElementById('addWater').addEventListener('click',function(){openModal('water');});
document.getElementById('closeModalBtn').addEventListener('click',closeModal);
document.getElementById('submitBtn').addEventListener('click',handleSubmit);
document.getElementById('period7').addEventListener('click',function(){changeChartPeriod(7);});
document.getElementById('period30').addEventListener('click',function(){changeChartPeriod(30);});
document.getElementById('familySelector').addEventListener('change',function(){renderAll();updateQuickStats();});

document.getElementById('bloodMinus').addEventListener('click',function(){adjustValue('bloodValue',-10);});
document.getElementById('bloodPlus').addEventListener('click',function(){adjustValue('bloodValue',10);});
document.getElementById('insulinMinus').addEventListener('click',function(){adjustValue('insulinValue',-1);});
document.getElementById('insulinPlus').addEventListener('click',function(){adjustValue('insulinValue',1);});
document.getElementById('foodMinus').addEventListener('click',function(){adjustValue('foodValue',-10);});
document.getElementById('foodPlus').addEventListener('click',function(){adjustValue('foodValue',10);});
document.getElementById('waterMinus').addEventListener('click',function(){adjustValue('waterValue',-50);});
document.getElementById('waterPlus').addEventListener('click',function(){adjustValue('waterValue',50);});

setupQuickButtons('bloodQuick','bloodValue',[100,150,200,300],['100','150','200','300']);
setupQuickButtons('insulinQuick','insulinValue',[7,10,13,15],['7','10','13','15']);
setupQuickButtons('foodQuick','foodValue',[150,200,250,300],['150g','200g','250g','300g']);
setupQuickButtons('waterQuick','waterValue',[150,200,250,300],['150ml','200ml','250ml','300ml']);

document.querySelectorAll('#recorderGroup .toggle-btn').forEach(function(btn){
btn.addEventListener('click',function(){
document.querySelectorAll('#recorderGroup .toggle-btn').forEach(function(b){b.classList.remove('active');});
btn.classList.add('active');
document.getElementById('recordRecorder').value=btn.dataset.name;
});
});

document.getElementById('recordModal').addEventListener('click',function(e){
if(e.target===document.getElementById('recordModal'))closeModal();
});
}

function adjustValue(id,step){
var el=document.getElementById(id);
var v=(parseFloat(el.value)||0)+step;
el.value=v>=0?v:0;
}

function setupQuickButtons(containerId,inputId,values,labels){
var container=document.getElementById(containerId);
var html='';
for(var i=0;i<values.length;i++){
html+='<button type="button" class="btn-quick" data-val="'+values[i]+'">'+labels[i]+'</button>';
}
container.innerHTML=html;
container.querySelectorAll('.btn-quick').forEach(function(btn){
btn.addEventListener('click',function(){
document.getElementById(inputId).value=btn.dataset.val;
});
});
}

/* ========== 모달 ========== */
function setDefaultDateTime(){
var now=new Date();
var y=now.getFullYear(),m=String(now.getMonth()+1).padStart(2,'0'),d=String(now.getDate()).padStart(2,'0');
var h=String(now.getHours()).padStart(2,'0'),mi=String(now.getMinutes()).padStart(2,'0');
document.getElementById('recordDate').value=y+'-'+m+'-'+d;
document.getElementById('recordTime').value=h+':'+mi;
}

function openModal(type){
document.getElementById('editId').value='';
document.getElementById('recordType').value=type;
document.getElementById('recordRecorder').value='';
document.getElementById('recordMemo').value='';
document.querySelectorAll('#recorderGroup .toggle-btn').forEach(function(b){b.classList.remove('active');});
setDefaultDateTime();
['bloodValueGroup','insulinValueGroup','foodValueGroup','waterValueGroup'].forEach(function(id){
document.getElementById(id).style.display='none';
});
var titles={blood:'💉 혈당 기록',insulin:'💊 인슐린 기록',food:'🍖 사료 기록',water:'💧 물 섭취 기록'};
document.getElementById('modalTitle').textContent=titles[type];
var defaults={blood:['bloodValueGroup','bloodValue',100],insulin:['insulinValueGroup','insulinValue',13],food:['foodValueGroup','foodValue',150],water:['waterValueGroup','waterValue',150]};
var d=defaults[type];
document.getElementById(d[0]).style.display='block';
document.getElementById(d[1]).value=d[2];
document.getElementById('recordModal').classList.add('active');
}

function closeModal(){document.getElementById('recordModal').classList.remove('active');}

function handleSubmit(){
var type=document.getElementById('recordType').value;
var date=document.getElementById('recordDate').value;
var time=document.getElementById('recordTime').value;
var recorder=document.getElementById('recordRecorder').value;
if(!date||!time||!recorder){alert('날짜, 시간, 기록자를 모두 선택해주세요');return;}
var valueIds={blood:'bloodValue',insulin:'insulinValue',food:'foodValue',water:'waterValue'};
var value=parseFloat(document.getElementById(valueIds[type]).value);
if(!value||value<=0){alert('값을 입력해주세요');return;}
var record={
id:document.getElementById('editId').value||Date.now().toString(),
type:type,date:date,time:time,value:value,
recorder:recorder,memo:document.getElementById('recordMemo').value||'',
timestamp:new Date(date+'T'+time).getTime()
};
set(ref(database,'families/'+familyId+'/records/'+record.id),record)
.then(function(){closeModal();showNotification('✅ 저장 완료!');})
.catch(function(err){alert('저장 실패: '+err.message);});
}

/* ========== 수정/삭제 (전역) ========== */
window.editRecord=function(id){
var record=records.find(function(r){return r.id===id||r.id===String(id);});
if(!record)return;
openModal(record.type);
document.getElementById('editId').value=record.id;
document.getElementById('recordDate').value=record.date;
document.getElementById('recordTime').value=record.time;
document.getElementById('recordRecorder').value=record.recorder;
document.getElementById('recordMemo').value=record.memo||'';
document.querySelectorAll('#recorderGroup .toggle-btn').forEach(function(btn){
if(btn.dataset.name===record.recorder)btn.classList.add('active');
});
var valueIds={blood:'bloodValue',insulin:'insulinValue',food:'foodValue',water:'waterValue'};
document.getElementById(valueIds[record.type]).value=record.value;
};

window.deleteRecord=function(id){
if(confirm('정말 삭제하시겠습니까?')){
remove(ref(database,'families/'+familyId+'/records/'+id))
.then(function(){showNotification('🗑️ 삭제됨');})
.catch(function(err){alert('삭제 실패: '+err.message);});
}
};

/* ========== 알림 ========== */
function showNotification(msg){
var el=document.getElementById('saveNotification');
if(el)el.remove();
var n=document.createElement('div');n.id='saveNotification';n.textContent=msg;
n.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:10px 20px;border-radius:20px;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:10000;font-size:14px;';
document.body.appendChild(n);
setTimeout(function(){n.remove();},2000);
}

/* ========== 필터링 ========== */
function getFilteredRecords(type){
var sel=document.getElementById('familySelector').value;
var f=records;
if(sel!=='all')f=f.filter(function(r){return r.recorder===sel;});
if(type)f=f.filter(function(r){return r.type===type;});
return f.sort(function(a,b){return b.timestamp-a.timestamp;});
}

/* ========== 렌더링 ========== */
function renderAll(){
renderRecordsList('blood','bloodRecordsList');
renderRecordsList('insulin','insulinRecordsList');
renderRecordsList('food','foodRecordsList');
renderRecordsList('water','waterRecordsList');
renderTodayRecords();renderChart();
}

function renderRecordsList(type,elId){
var c=document.getElementById(elId);
var f=getFilteredRecords(type);
if(f.length===0){c.innerHTML='<div class="empty-state"><div class="empty-icon">📝</div><p>아직 기록이 없습니다</p></div>';return;}
var units={blood:'mg/dL',insulin:'단위',food:'g',water:'ml'};
var colors={'엄마':'#FF6BB3','아빠':'#3498DB','딸':'#FF9F43'};
var html='';
f.forEach(function(r){
var lc='',lt='';
if(type==='blood'){
if(r.value<80){lc='level-low';lt='낮음';}
else if(r.value>300){lc='level-high';lt='높음';}
else if(r.value>250){lc='level-high';lt='주의';}
else{lc='level-normal';lt='정상';}
}
var col=colors[r.recorder]||'#999';
html+='<div class="card record-item"><div class="record-info">';
html+='<div class="record-time">'+r.date+' '+r.time;
html+='<span class="family-badge" style="background:'+col+'22;color:'+col+'">'+r.recorder+'</span></div>';
html+='<div class="record-value">'+r.value+' '+units[type];
if(type==='blood'&&lc)html+='<span class="blood-level '+lc+'">'+lt+'</span>';
html+='</div>';
if(r.memo)html+='<div style="font-size:12px;color:var(--text-light);margin-top:4px">'+r.memo+'</div>';
html+='</div><div class="record-actions">';
html+='<button class="btn-icon btn-edit" onclick="editRecord(\''+r.id+'\')">✏️</button>';
html+='<button class="btn-icon btn-delete" onclick="deleteRecord(\''+r.id+'\')">🗑️</button>';
html+='</div></div>';
});
c.innerHTML=html;
}

function renderTodayRecords(){
var c=document.getElementById('todayRecordsList');
var now=new Date();
var today=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
var tr=getFilteredRecords().filter(function(r){return r.date===today;});
if(tr.length===0){c.innerHTML='<div class="empty-state"><div class="empty-icon">📝</div><p>오늘 기록이 없습니다</p></div>';return;}
var tn={blood:'💉 혈당',insulin:'💊 인슐린',food:'🍖 사료',water:'💧 물'};
var un={blood:'mg/dL',insulin:'단위',food:'g',water:'ml'};
var html='';
tr.forEach(function(r){
html+='<div class="record-item"><div class="record-info">';
html+='<div class="record-time">'+tn[r.type]+' • '+r.time+' • '+r.recorder+'</div>';
html+='<div class="record-value">'+r.value+' '+un[r.type]+'</div>';
html+='</div></div>';
});
c.innerHTML=html;
}

/* ========== 차트 ========== */
function renderChart(){
var canvas=document.getElementById('bloodChart');
if(!canvas)return;
var ctx=canvas.getContext('2d');
if(currentChart){currentChart.destroy();currentChart=null;}
var br=getFilteredRecords('blood');
var cutoff=new Date();cutoff.setDate(cutoff.getDate()-currentChartPeriod);
var recent=br.filter(function(r){return new Date(r.date+'T'+r.time)>=cutoff;}).sort(function(a,b){return a.timestamp-b.timestamp;});
if(recent.length===0){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.font='14px Noto Sans KR';ctx.fillStyle='#7F8C8D';ctx.textAlign='center';
ctx.fillText('이 기간에 혈당 기록이 없습니다',canvas.width/2,canvas.height/2);
return;
}
var labels=recent.map(function(r){var d=new Date(r.date);return(d.getMonth()+1)+'/'+d.getDate()+' '+r.time.substring(0,5);});
var data=recent.map(function(r){return r.value;});
var min=Math.min.apply(null,data),max=Math.max.apply(null,data);
var pad=Math.max((max-min)*0.2,20);
currentChart=new Chart(ctx,{type:'line',data:{labels:labels,datasets:[{label:'혈당',data:data,borderColor:'#FF6BB3',backgroundColor:'rgba(255,107,179,0.1)',borderWidth:3,tension:0.4,fill:true,pointRadius:5,pointBackgroundColor:'#FF6BB3',pointBorderColor:'#fff',pointBorderWidth:2,pointHoverRadius:7}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(0,0,0,.8)',padding:10,callbacks:{label:function(ctx2){var r=recent[ctx2.dataIndex];return[ctx2.parsed.y+' mg/dL','기록자: '+r.recorder];}}}},scales:{y:{beginAtZero:false,min:Math.max(0,Math.floor(min-pad)),max:Math.ceil(max+pad),ticks:{font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}},x:{ticks:{font:{size:currentChartPeriod===7?9:7},maxRotation:45,minRotation:45},grid:{display:false}}}}});
}

function changeChartPeriod(p){
currentChartPeriod=p;
document.querySelectorAll('.chart-period-btn').forEach(function(b){
b.classList.remove('active');
if(parseInt(b.dataset.period)===p)b.classList.add('active');
});
renderChart();
}

/* ========== 통계 ========== */
function updateQuickStats(){
var now=new Date();
var today=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
var tr=getFilteredRecords().filter(function(r){return r.date===today;});
var tb=tr.filter(function(r){return r.type==='blood';});
if(tb.length>0){
var avg=tb.reduce(function(s,r){return s+r.value;},0)/tb.length;
document.getElementById('todayAvgBlood').textContent=Math.round(avg);
}else{document.getElementById('todayAvgBlood').textContent='-';}
var ti=tr.filter(function(r){return r.type==='insulin';});
if(ti.length>0){
var tot=ti.reduce(function(s,r){return s+r.value;},0);
document.getElementById('todayInsulin').textContent=tot;
}else{document.getElementById('todayInsulin').textContent='-';}
document.getElementById('todayRecords').textContent=tr.length;
}

/* ========== 자동 로그인 ========== */
var savedId=localStorage.getItem('mongiFamilyId');
if(savedId&&database){
familyId=savedId;
document.getElementById('familyIdDisplay').textContent='가족 ID: '+familyId;
document.getElementById('setupScreen').style.display='none';
document.getElementById('mainApp').style.display='block';
startApp();
}
</script>
